name: Build FFmpeg + xfade-easing

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: "FFmpeg version to build"
        required: false
        default: "8.1.2"

permissions:
  contents: write

env:
  FFMPEG_VERSION: ${{ inputs.ffmpeg_version || '8.1.2' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: ffmpeg-xfade-linux-x86_64
            platform: linux
          - os: macos-14
            artifact: ffmpeg-xfade-macos-arm64
            platform: macos
          - os: windows-latest
            artifact: ffmpeg-xfade-windows-x86_64
            platform: windows

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Linux dependencies ──
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm yasm pkg-config \
            libx264-dev libmp3lame-dev libopus-dev libvpx-dev \
            libfreetype-dev libfontconfig1-dev \
            libssl-dev zlib1g-dev

      # ── macOS dependencies ──
      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install nasm x264 lame opus libvpx pkg-config openssl

      # ── Windows dependencies (MSYS2) ──
      - name: Setup MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-yasm
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-x264
            mingw-w64-x86_64-lame
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-libvpx
            mingw-w64-x86_64-openssl
            make
            tar
            xz

      # ── Download FFmpeg source ──
      - name: Download FFmpeg source
        shell: bash
        run: |
          mkdir -p build
          curl -sL "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" \
            -o "build/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          tar -xf "build/ffmpeg-${FFMPEG_VERSION}.tar.xz" -C build

      # ── Apply xfade-easing patch ──
      - name: Apply xfade-easing patch
        shell: bash
        run: |
          FFMPEG_DIR="build/ffmpeg-${FFMPEG_VERSION}"
          cp -f vendor/xfade-easing/src/vf_xfade.c     "$FFMPEG_DIR/libavfilter/vf_xfade.c"
          cp -f vendor/xfade-easing/src/xfade-easing.h  "$FFMPEG_DIR/libavfilter/xfade-easing.h"
          echo "Patch applied"

      # ── Configure (Linux) ──
      - name: Configure (Linux)
        if: matrix.platform == 'linux'
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: |
          ./configure \
            --prefix="$(pwd)/../install" \
            --enable-gpl --enable-version3 \
            --enable-libx264 --enable-libmp3lame --enable-libopus --enable-libvpx \
            --enable-openssl \
            --disable-doc --disable-debug \
            --disable-programs --enable-ffmpeg --disable-ffplay --disable-ffprobe

      # ── Configure (macOS) ──
      - name: Configure (macOS)
        if: matrix.platform == 'macos'
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: |
          BREW=$(brew --prefix)
          export PKG_CONFIG_PATH="${BREW}/opt/x264/lib/pkgconfig:${BREW}/opt/opus/lib/pkgconfig:${BREW}/opt/libvpx/lib/pkgconfig:${BREW}/opt/openssl/lib/pkgconfig:${BREW}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          ./configure \
            --prefix="$(pwd)/../install" \
            --enable-gpl --enable-version3 \
            --enable-libx264 --enable-libmp3lame --enable-libopus --enable-libvpx \
            --enable-openssl \
            --cc=clang \
            --extra-cflags="-I${BREW}/opt/lame/include" \
            --extra-ldflags="-L${BREW}/opt/lame/lib" \
            --disable-doc --disable-debug \
            --disable-programs --enable-ffmpeg --disable-ffplay --disable-ffprobe

      # ── Configure (Windows/MSYS2) ──
      - name: Configure (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: |
          MINGW_PREFIX="/mingw64"
          ./configure \
            --prefix="$(pwd)/../install" \
            --enable-gpl --enable-version3 \
            --enable-libx264 --enable-libmp3lame --enable-libopus --enable-libvpx \
            --enable-openssl \
            --disable-doc --disable-debug \
            --disable-programs --enable-ffmpeg --disable-ffplay --disable-ffprobe \
            --extra-cflags="-I${MINGW_PREFIX}/include" \
            --extra-ldflags="-L${MINGW_PREFIX}/lib"

      # ── Build ──
      - name: Build (Linux/macOS)
        if: matrix.platform != 'windows'
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          make -j"$NPROC"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: make -j$(nproc)

      # ── Install ──
      - name: Install (Linux/macOS)
        if: matrix.platform != 'windows'
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: make install

      - name: Install (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        working-directory: build/ffmpeg-${{ env.FFMPEG_VERSION }}
        run: make install

      # ── Verify xfade-easing ──
      - name: Verify xfade-easing (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          BINARY="build/install/bin/ffmpeg"
          echo "--- Version ---"
          "$BINARY" -version | head -1
          echo "--- xfade options ---"
          "$BINARY" -hide_banner --help filter=xfade 2>&1 | grep -E "easing|reverse" || true
          "$BINARY" -hide_banner --help filter=xfade 2>&1 | grep -q "easing" || {
            echo "❌ easing option not found — xfade-easing patch not applied"
            exit 1
          }
          echo "✅ xfade-easing patch verified"

      - name: Verify xfade-easing (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          BINARY="build/install/bin/ffmpeg.exe"
          echo "--- Version ---"
          "$BINARY" -version | head -1
          echo "--- xfade options ---"
          "$BINARY" -hide_banner --help filter=xfade 2>&1 | grep -E "easing|reverse" || true
          "$BINARY" -hide_banner --help filter=xfade 2>&1 | grep -q "easing" || {
            echo "❌ easing option not found — xfade-easing patch not applied"
            exit 1
          }
          echo "✅ xfade-easing patch verified"

      # ── Package artifact ──
      - name: Package artifact (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p release
          cp build/install/bin/ffmpeg release/ffmpeg-xfade
          chmod +x release/ffmpeg-xfade
          cd release && tar -czf "${{ matrix.artifact }}.tar.gz" ffmpeg-xfade

      - name: Package artifact (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p release
          cp build/install/bin/ffmpeg.exe release/ffmpeg-xfade.exe
          cd release && 7z a "${{ matrix.artifact }}.zip" ffmpeg-xfade.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/${{ matrix.artifact }}.tar.gz
            release/${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
